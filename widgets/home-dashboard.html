<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #111118 60%, #0d0d1a 100%);
    color: #e8d5b7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .widget { text-align: center; padding: 48px 60px; max-width: 680px; width: 100%; }
  .eyebrow { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: #C9A227; margin-bottom: 20px; opacity: 0.8; }
  .greeting { font-size: 38px; font-weight: 300; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 10px; }
  .greeting strong { color: #C9A227; font-weight: 600; }
  .sub { font-size: 14px; color: #666; letter-spacing: 0.06em; font-weight: 300; }
  .rule { width: 48px; height: 1px; background: linear-gradient(90deg, transparent, #C9A227, transparent); margin: 32px auto; }
  .stats { display: flex; gap: 0; justify-content: center; border: 1px solid rgba(201,162,39,0.15); border-radius: 12px; overflow: hidden; }
  .stat { flex: 1; padding: 24px 20px; border-right: 1px solid rgba(201,162,39,0.1); }
  .stat:last-child { border-right: none; }
  .stat-value { font-size: 30px; font-weight: 700; color: #C9A227; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; margin-bottom: 6px; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: #555; }
  .ring-wrap { margin-top: 28px; position: relative; display: inline-block; }
  .ring-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 12px; color: #888; text-align: center; line-height: 1.3; }
  .ring-text span { display: block; font-size: 18px; font-weight: 700; color: #C9A227; }
  circle { transition: stroke-dashoffset 1.2s cubic-bezier(0.4,0,0.2,1); }
</style>
</head>
<body>
<div class="widget">
  <div class="eyebrow" id="dateStr"></div>
  <div class="greeting">Good <strong id="tPart">morning</strong>, freelancer.</div>
  <div class="sub">Your business. Your rules. Your time.</div>
  <div class="rule"></div>
  <div class="stats">
    <div class="stat"><div class="stat-value" id="dayNo">—</div><div class="stat-label">Day of Year</div></div>
    <div class="stat"><div class="stat-value" id="weekNo">—</div><div class="stat-label">Current Week</div></div>
    <div class="stat"><div class="stat-value" id="dLeft">—</div><div class="stat-label">Days Remaining</div></div>
  </div>
  <div class="ring-wrap">
    <svg width="88" height="88" viewBox="0 0 88 88">
      <circle cx="44" cy="44" r="36" fill="none" stroke="#1a1a1a" stroke-width="5"/>
      <circle id="ring" cx="44" cy="44" r="36" fill="none" stroke="#C9A227" stroke-width="5" stroke-linecap="round" stroke-dasharray="226" stroke-dashoffset="226" transform="rotate(-90 44 44)"/>
    </svg>
    <div class="ring-text"><span id="pct">0%</span>of year</div>
  </div>
</div>
<script>
  const now = new Date();
  const M = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const D = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('dateStr').textContent = D[now.getDay()] + '  ·  ' + M[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  const h = now.getHours();
  document.getElementById('tPart').textContent = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
  const soy = new Date(now.getFullYear(),0,1);
  const dayNo = Math.ceil((now-soy)/86400000);
  document.getElementById('dayNo').textContent = dayNo;
  document.getElementById('weekNo').textContent = 'W' + Math.ceil(dayNo/7);
  document.getElementById('dLeft').textContent = Math.ceil((new Date(now.getFullYear(),11,31)-now)/86400000);
  const pct = Math.round((dayNo/365)*100);
  document.getElementById('pct').textContent = pct + '%';
  setTimeout(() => { document.getElementById('ring').style.strokeDashoffset = 226-(226*pct/100); }, 100);
</script>
</body>
</html>
